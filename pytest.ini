[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra

# Modules that fundamentally require a GPU / network / external models / a live
# OCR server / a pre-existing benchmark run are excluded from the Session 7
# coverage gate (they cannot run in the offline, CPU-only test path). Their
# importable logic is covered elsewhere; only their runtime network/OCR calls
# are omitted.
[coverage:run]
omit =
    backend/paddle_ocr_provider.py
    backend/qwen_vl_provider.py
    backend/qwen_vl_server.py
    backend/qwen_llama_server.py
    backend/print_ocr_server.py
    backend/benchmark_pipeline.py
    backend/migrate_auto_to_pipeline.py
    backend/check_providers.py

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:

